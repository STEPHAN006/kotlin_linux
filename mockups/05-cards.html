<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SCpay — Cartes</title>
<link rel="stylesheet" href="scpay-design.css">
<style>
.credit-card {
  width:100%;height:200px;border-radius:18px;padding:22px;
  position:relative;overflow:hidden;cursor:pointer;
  background:linear-gradient(135deg,#171717,#2D3038);
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  transition:transform 0.2s;
}
.credit-card:hover{transform:scale(1.02);}
.credit-card.solana{background:linear-gradient(135deg,#7D56F4,#28D0A0,#1E3C72);}
.credit-card.nature{background:linear-gradient(135deg,#11998E,#38EF7D);}
.card-action-btn {
  display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;
}
.card-action-circle {
  width:56px;height:56px;border-radius:50%;background:var(--surface-high);
  display:flex;align-items:center;justify-content:center;transition:transform 0.15s;
}
.card-action-circle:hover{transform:scale(1.05);}
.card-action-circle svg{width:24px;height:24px;fill:var(--white);}
.card-action-btn span{font-size:13px;color:var(--muted);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted);opacity:0.4;transition:all 0.2s;}
.dot.active{width:22px;border-radius:4px;background:var(--magenta);opacity:1;}
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <div class="screen" style="padding:0 24px;">
    <!-- Header -->
    <div style="display:flex;align-items:center;padding:16px 0 20px;">
      <h1 style="font-family:'Hanken Grotesk',sans-serif;font-size:32px;font-weight:800;color:#fff;flex:1;">Cartes</h1>
      <button class="icon-btn">
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
      </button>
      <button class="icon-btn">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </button>
    </div>

    <!-- Card -->
    <div class="credit-card solana" style="margin-bottom:16px;">
      <div style="position:absolute;top:16px;right:20px;font-size:14px;font-weight:700;color:rgba(255,255,255,0.8);">MGA</div>
      <!-- Solana bars -->
      <div style="position:absolute;bottom:20px;right:20px;display:flex;flex-direction:column;gap:3px;">
        <div style="width:22px;height:3px;background:#fff;border-radius:2px;transform:rotate(-12deg);"></div>
        <div style="width:22px;height:3px;background:#fff;border-radius:2px;transform:rotate(-12deg);"></div>
        <div style="width:22px;height:3px;background:#fff;border-radius:2px;transform:rotate(-12deg);"></div>
      </div>
      <div style="position:absolute;bottom:16px;left:22px;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:#fff;letter-spacing:2px;margin-bottom:20px;">•••• •••• •••• 1000</div>
        <div style="display:flex;gap:40px;">
          <div>
            <div style="font-size:11px;color:rgba(255,255,255,0.7);">Valide jusqu'au</div>
            <div style="font-size:15px;font-weight:700;color:#fff;">••/••</div>
          </div>
          <div>
            <div style="font-size:11px;color:rgba(255,255,255,0.7);">CVV</div>
            <div style="font-size:15px;font-weight:700;color:#fff;">•••</div>
          </div>
        </div>
      </div>
      <div style="position:absolute;top:16px;left:22px;font-size:15px;font-weight:800;color:#fff;letter-spacing:1px;">VISA</div>
    </div>

    <!-- Dots -->
    <div style="display:flex;justify-content:center;gap:6px;margin-bottom:20px;">
      <div class="dot"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
    </div>

    <!-- Card Actions -->
    <div style="display:flex;justify-content:space-between;margin-bottom:22px;">
      <div class="card-action-btn">
        <div class="card-action-circle">
          <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </div>
        <span>Voir</span>
      </div>
      <div class="card-action-btn">
        <div class="card-action-circle">
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
        </div>
        <span>Bloquer</span>
      </div>
      <div class="card-action-btn">
        <div class="card-action-circle">
          <svg viewBox="0 0 24 24"><path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/></svg>
        </div>
        <span>Limite</span>
      </div>
      <div class="card-action-btn">
        <div class="card-action-circle">
          <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
        </div>
        <span>Paramètre</span>
      </div>
    </div>

    <!-- Google Wallet -->
    <div style="display:flex;justify-content:center;margin-bottom:24px;">
      <div style="display:flex;align-items:center;gap:10px;background:#1e2022;border-radius:28px;padding:10px 22px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);">
        <div style="width:32px;height:32px;border-radius:7px;background:linear-gradient(90deg,#4285F4,#34A853,#FBBC05,#EA4335);"></div>
        <div>
          <div style="font-size:11px;color:rgba(255,255,255,0.7);">Add to</div>
          <div style="font-size:17px;font-weight:600;color:#fff;">Google Wallet</div>
        </div>
      </div>
    </div>

    <!-- Transactions -->
    <div style="display:flex;align-items:center;margin-bottom:14px;">
      <span class="h3" style="flex:1;">Transactions</span>
      <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:var(--muted);"><path d="M4 14h4v-4H4v4zm0 5h4v-4H4v4zM4 9h4V5H4v4zm5 5h12v-4H9v4zm0 5h12v-4H9v4zM9 5v4h12V5H9z"/></svg>
    </div>
    <div class="txn-row">
      <div class="txn-icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2z"/></svg></div>
      <div class="txn-info"><div class="title">Achat par carte</div><div class="sub">•• 1000 · Shopping</div></div>
      <div class="txn-amount"><div class="val">-10,00 USD</div><div class="status success">Succès</div></div>
    </div>
    <div class="divider"></div>
    <div class="txn-row">
      <div class="txn-icon" style="background:rgba(93,187,130,0.12);"><svg viewBox="0 0 24 24" style="fill:var(--success);"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9z"/></svg></div>
      <div class="txn-info"><div class="title">Déposez des pièces</div><div class="sub">Wallet SCpay</div></div>
      <div class="txn-amount"><div class="val success">+50,00 USDT</div><div class="status success">Crédit</div></div>
    </div>
    <div style="height:24px;"></div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="01-dashboard.html"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Accueil</span></a>
    <a class="nav-item" href="03-history.html"><svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg><span>Historique</span></a>
    <a class="nav-item" href="02-transfer.html"><svg viewBox="0 0 24 24"><path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z"/></svg><span>Virement</span></a>
    <a class="nav-item active" href="05-cards.html"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg><span>Cartes</span></a>
    <a class="nav-item" href="06-profile.html"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Profil</span></a>
  </nav>
</div>
</body>
</html>
