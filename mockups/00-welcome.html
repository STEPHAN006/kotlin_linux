<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SCpay — Welcome</title>
<link rel="stylesheet" href="scpay-design.css">
<style>
body { background:#000; }
.phone { background:#000; }
.welcome-bg {
  position:absolute;inset:0;
  background: linear-gradient(160deg,#0a0012 0%,#100822 30%,#0a1a10 60%,#000 100%);
}
.welcome-bg::before {
  content:'';position:absolute;
  top:-100px;left:-100px;width:400px;height:400px;
  background:radial-gradient(circle,rgba(255,0,122,0.15),transparent 60%);
  border-radius:50%;
}
.welcome-bg::after {
  content:'';position:absolute;
  bottom:-50px;right:-50px;width:300px;height:300px;
  background:radial-gradient(circle,rgba(0,200,100,0.08),transparent 60%);
  border-radius:50%;
}
.login-sheet {
  position:absolute;bottom:0;left:0;right:0;
  background:var(--surface-mid);
  border-radius:24px 24px 0 0;
  padding:24px;
  border-top:1px solid rgba(255,255,255,0.08);
  display:none;
}
.login-sheet.active { display:block; }
.overlay { position:absolute;inset:0;background:rgba(0,0,0,0.7);display:none;z-index:50; }
.overlay.active { display:block; }
</style>
</head>
<body>
<div class="phone" style="min-height:844px;position:relative;overflow:hidden;">
  <div class="welcome-bg"></div>

  <!-- Floating particles effect -->
  <div style="position:absolute;top:80px;right:30px;width:6px;height:6px;background:var(--magenta);border-radius:50%;opacity:0.6;"></div>
  <div style="position:absolute;top:180px;left:40px;width:4px;height:4px;background:#5DBB82;border-radius:50%;opacity:0.4;"></div>
  <div style="position:absolute;top:260px;right:60px;width:3px;height:3px;background:#5B8DEF;border-radius:50%;opacity:0.5;"></div>

  <div style="position:relative;z-index:10;display:flex;flex-direction:column;height:100%;padding:0 22px;">
    <!-- Status bar -->
    <div style="height:44px;display:flex;align-items:center;justify-content:space-between;padding-top:12px;">
      <span style="font-size:15px;font-weight:600;color:#fff;">9:41</span>
    </div>

    <!-- Logo top -->
    <div style="text-align:center;padding-top:16px;">
      <div style="font-family:'Hanken Grotesk',sans-serif;font-size:44px;font-weight:800;color:#fff;letter-spacing:1px;">SCpay</div>
      <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.6);letter-spacing:2.5px;margin-top:2px;">BANQUE PRIVÉE MOBILE</div>
    </div>

    <!-- Center visual — Premium card -->
    <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:20px 0;">
      <div style="width:280px;height:175px;border-radius:18px;background:linear-gradient(135deg,#7D56F4,#28D0A0,#1E3C72);padding:22px;position:relative;box-shadow:0 30px 80px rgba(125,86,244,0.4);">
        <div style="position:absolute;top:16px;right:20px;font-size:14px;font-weight:700;color:rgba(255,255,255,0.8);">MGA</div>
        <div style="position:absolute;bottom:16px;left:22px;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:15px;color:#fff;letter-spacing:2px;margin-bottom:18px;">•••• •••• •••• 8888</div>
          <div style="display:flex;gap:30px;">
            <div><div style="font-size:10px;color:rgba(255,255,255,0.6);">MEMBRE PRIVILÈGE</div></div>
            <div><div style="font-size:11px;color:rgba(255,255,255,0.6);">12/29</div></div>
          </div>
        </div>
        <div style="position:absolute;top:14px;left:22px;font-size:18px;font-weight:800;color:#fff;">VISA</div>
        <!-- Chip -->
        <div style="position:absolute;top:50px;left:22px;width:36px;height:26px;background:rgba(212,175,55,0.8);border-radius:6px;"></div>
      </div>
    </div>

    <!-- Tagline -->
    <div style="padding-bottom:12px;">
      <div style="font-family:'Hanken Grotesk',sans-serif;font-size:28px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:10px;">Votre argent,<br>plus fluide.</div>
      <div style="font-size:14px;color:rgba(255,255,255,0.65);line-height:1.6;">Paiements, cartes et virements dans une expérience rapide et élégante.</div>
    </div>

    <!-- Buttons -->
    <div style="display:flex;flex-direction:column;gap:12px;padding-bottom:34px;">
      <button class="btn-primary" onclick="showSheet('register')" style="background:#fff;color:#000;">
        Créer un compte
      </button>
      <button style="width:100%;height:54px;background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.3);border-radius:var(--radius-full);font-family:'Hanken Grotesk',sans-serif;font-size:16px;font-weight:700;cursor:pointer;" onclick="showSheet('login')">
        Me connecter
      </button>
    </div>
  </div>

  <!-- Overlay -->
  <div class="overlay" id="overlay" onclick="hideSheets()"></div>

  <!-- Login Sheet -->
  <div class="login-sheet" id="loginSheet" style="z-index:100;">
    <div style="width:40px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 20px;"></div>
    <div style="display:flex;align-items:center;margin-bottom:20px;">
      <h2 class="h2" style="flex:1;">Connexion</h2>
      <button class="icon-btn" onclick="hideSheets()">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px;margin-bottom:20px;">
      <div style="position:relative;">
        <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        <input class="input-field has-icon" type="email" placeholder="Adresse email">
      </div>
      <div style="position:relative;">
        <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
        <input class="input-field has-icon" type="password" placeholder="Mot de passe">
        <button class="icon-btn" style="position:absolute;right:6px;bottom:6px;">
          <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </button>
      </div>
      <div style="text-align:right;"><span style="font-size:13px;color:var(--magenta);cursor:pointer;">Mot de passe oublié ?</span></div>
    </div>
    <button class="btn-primary" style="margin-bottom:12px;" onclick="window.location='01-dashboard.html'">Se connecter</button>
    <div style="text-align:center;font-size:13px;color:var(--muted);">
      Pas de compte ? <span style="color:var(--magenta);cursor:pointer;" onclick="showSheet('register')">Créer un compte</span>
    </div>
  </div>

  <!-- Register Sheet -->
  <div class="login-sheet" id="registerSheet" style="z-index:100;">
    <div style="width:40px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 20px;"></div>
    <div style="display:flex;align-items:center;margin-bottom:20px;">
      <h2 class="h2" style="flex:1;">Inscription</h2>
      <button class="icon-btn" onclick="hideSheets()">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:20px;">
      <div style="position:relative;">
        <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <input class="input-field has-icon" type="text" placeholder="Nom Complet">
      </div>
      <div style="position:relative;">
        <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        <input class="input-field has-icon" type="email" placeholder="Adresse email">
      </div>
      <div style="position:relative;">
        <svg class="input-icon" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
        <input class="input-field has-icon" type="tel" placeholder="Téléphone mobile">
      </div>
      <div style="position:relative;">
        <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2z"/></svg>
        <input class="input-field has-icon" type="password" placeholder="Mot de passe">
      </div>
    </div>
    <button class="btn-primary" onclick="window.location='01-dashboard.html'">Créer mon compte</button>
  </div>
</div>

<script>
function showSheet(type) {
  document.getElementById('overlay').classList.add('active');
  document.getElementById('loginSheet').classList.remove('active');
  document.getElementById('registerSheet').classList.remove('active');
  document.getElementById(type + 'Sheet').classList.add('active');
}
function hideSheets() {
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('loginSheet').classList.remove('active');
  document.getElementById('registerSheet').classList.remove('active');
}
</script>
</body>
</html>
